# Docker Compose для Smart VPN

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: vpn_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-vpn_db}
      POSTGRES_USER: ${DB_USER:-vpn_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vpn_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/init:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - vpn_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vpn_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vpn_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - vpn_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vpn_api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vpn_network
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./logs:/app/logs
    restart: unless-stopped

  # Xray VPN Server
  xray:
    image: teddysun/xray:latest
    container_name: vpn_xray
    ports:
      - "${XRAY_SERVER_PORT:-443}:443"
      - "${XRAY_SERVER_PORT:-443}:443/udp"
    volumes:
      - ./config/xray:/etc/xray
      - ./config/certs:/etc/certs
    networks:
      - vpn_network
    restart: unless-stopped
    depends_on:
      - api

  # Telegram Bot
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vpn_bot
    command: ["node", "src/bot/index.js"]
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DB_HOST: postgres
      REDIS_HOST: redis
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - api
    networks:
      - vpn_network
    restart: unless-stopped

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: vpn_prometheus
    volumes:
      - ./config/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - vpn_network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: vpn_grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    networks:
      - vpn_network
    depends_on:
      - prometheus
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: vpn_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx:/etc/nginx/conf.d
      - ./config/certs:/etc/certs
    depends_on:
      - api
      - bot
    networks:
      - vpn_network
    restart: unless-stopped

networks:
  vpn_network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
